name: luci-theme-defdo-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: false
        type: string
      openwrt_ref:
        description: OpenWrt git ref
        required: false
        default: openwrt-24.10
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-distutils python3-setuptools \
            python3-pyelftools rsync subversion swig unzip zlib1g-dev file wget

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 --branch "${{ inputs.openwrt_ref }}" \
            https://git.openwrt.org/openwrt/openwrt.git "$RUNNER_TEMP/openwrt"

      - name: Update feeds
        working-directory: ${{ runner.temp }}/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build luci-theme-defdo
        env:
          OPENWRT_DIR: ${{ runner.temp }}/openwrt
        run: |
          ./scripts/build_luci_theme_defdo.sh

      - name: Collect artifacts
        id: collect
        run: |
          ipk="$(find "$RUNNER_TEMP/openwrt/bin/packages" -type f -name 'luci-theme-defdo_*_all.ipk' | sort | tail -n 1)"
          sha256sum "$ipk" > "$ipk.sha256"
          echo "ipk=$ipk" >> "$GITHUB_OUTPUT"
          echo "sha=$ipk.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-defdo
          path: |
            ${{ steps.collect.outputs.ipk }}
            ${{ steps.collect.outputs.sha }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="luci-theme-defdo-${GITHUB_RUN_NUMBER}"
          fi

          notes="$(mktemp)"
          cat > "$notes" <<EOF
          Automated build for luci-theme-defdo

          OpenWrt ref:
          - ${{ inputs.openwrt_ref }}

          Commit:
          - ${GITHUB_SHA}
          EOF

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "${{ steps.collect.outputs.ipk }}" \
              "${{ steps.collect.outputs.sha }}" \
              --clobber
          else
            gh release create "$tag" \
              "${{ steps.collect.outputs.ipk }}" \
              "${{ steps.collect.outputs.sha }}" \
              --title "$tag" \
              --notes-file "$notes"
          fi
